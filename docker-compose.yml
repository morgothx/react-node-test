services:
  db:
    image: postgres:16-alpine
    container_name: school_mgmt_db
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: school_mgmt
    ports:
      - "5432:5432"
    volumes:
      - school_mgmt_data:/var/lib/postgresql/data
      # Seeds: corren en orden alfabético SOLO en la primera init.
      - ./seed_db/tables.sql:/docker-entrypoint-initdb.d/01-tables.sql:ro
      - ./seed_db/seed-db.sql:/docker-entrypoint-initdb.d/02-seed-db.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d school_mgmt"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  school_mgmt_data: